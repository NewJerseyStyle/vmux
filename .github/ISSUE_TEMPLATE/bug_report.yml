name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What you expected vs. what actually happened.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `vmux ...`
        2. Open ...
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: vmux version
      placeholder: "output of `vmux --version`"
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "OS (macOS 15 / Ubuntu 24.04 / WSL), Python version, tmux version, browser"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / console output
      description: Server output and/or browser console. **Do not paste your token.**
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I redacted any access token from logs/screenshots
          required: true
        - label: I'm on a recent version
          required: true
