name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: The use case or pain point, ideally from real swarm-wrangling.
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Proposed solution
      description: What you'd like vmux to do. Mockups/screenshots welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: scope
    attributes:
      label: Does this fit "small tool, not a platform"?
      options:
        - "Yes — small, focused"
        - "Maybe — worth discussing"
        - "Not sure"
    validations:
      required: true
